name: Bug report
description: Report a defect in a public TicketWave HQ repository
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.

        **Do not use this template for security issues.** Security reports go to `security@ticketwavehq.com` per [SECURITY.md](https://github.com/TicketWaveHQ/.github/blob/main/SECURITY.md).
  - type: input
    id: repo
    attributes:
      label: Repository
      description: Which TicketWaveHQ public repo is affected?
      placeholder: e.g. openapi-spec
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Tag, release, or commit SHA you are running.
      placeholder: e.g. v1.4.0 or 7c3a9f1
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the problem and the impact.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal repro — commands, payloads, environment details.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs, errors, screenshots
      description: Paste relevant output. Wrap long output in `<details>` tags.
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: pre-flight
    attributes:
      label: Pre-flight checks
      options:
        - label: I have searched existing issues and could not find a duplicate.
          required: true
        - label: This is not a security vulnerability (those go to `security@ticketwavehq.com`).
          required: true
        - label: I agree to follow the project's [Code of Conduct](https://github.com/TicketWaveHQ/.github/blob/main/CODE_OF_CONDUCT.md).
          required: true
