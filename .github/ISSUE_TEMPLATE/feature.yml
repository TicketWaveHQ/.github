name: Feature request
description: Suggest an enhancement to a public TicketWave HQ repository
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. For anything non-trivial, please open the issue and discuss approach before opening a pull request — we would rather agree direction first.
  - type: input
    id: repo
    attributes:
      label: Repository
      description: Which TicketWaveHQ public repo would this affect?
      placeholder: e.g. openapi-spec
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain or gap. Concrete examples are best.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see change? Sketch the shape of the API, command, or behaviour.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why this one is preferred.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, related issues.
    validations:
      required: false
  - type: checkboxes
    id: pre-flight
    attributes:
      label: Pre-flight checks
      options:
        - label: I have searched existing issues and discussions and could not find a duplicate.
          required: true
        - label: I agree to follow the project's [Code of Conduct](https://github.com/TicketWaveHQ/.github/blob/main/CODE_OF_CONDUCT.md).
          required: true
